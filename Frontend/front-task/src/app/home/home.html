<app-header></app-header>
<div class="main-container">
  <div class="main-content" [ngClass]="{ 'shifted': isSidebarOpen }">
    <!-- Bloque My dashboards -->
    <h1 class="title">My dashboards</h1>
    <div class="dashboard-container">
      <div class="dashboard-card">
        <div class="card-top"></div>
        <div class="card-bottom">
          <span class="card-name">Dashboard 1</span>
          <i class="bi bi-three-dots-vertical card-icon"></i> 
        </div>
      </div>

      <!-- Botones -->
      <div class="dashboard-actions">
        <button class="action-btn">
          <i class="bi bi-plus-circle"></i>
        </button>
        <button class="action-btn">
          <i class="bi bi-eye"></i>
        </button>
      </div>
    </div>

    <!-- Bloque Shared with me -->
    <h1 class="title">Shared with me</h1>
    <div class="dashboard-container">
      <div class="dashboard-card">
        <div class="card-top"></div>
        <div class="card-bottom">
          <span class="card-name">Dashboard from James</span>
          <i class="bi bi-three-dots-vertical card-icon"></i>
        </div>
      </div>

      <!-- Botones -->
      <div class="dashboard-actions">
        <button class="action-btn">
          <i class="bi bi-eye"></i>
        </button>
      </div>
    </div>
  </div>
</div>
